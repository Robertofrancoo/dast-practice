name: DAST Security Scan - OWASP ZAP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - name: Build and start app
        run: |
          docker build -t dast-practice-app .
          docker run -d -p 8000:8000 --name my-app dast-practice-app

      - name: Wait for app to be ready
        run: |
          echo "Esperando que la app inicie..."
          sleep 15
          curl -f http://localhost:8000/health

      - name: Pull OWASP ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run OWASP ZAP Baseline Scan
        id: zap_scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-reports
          chmod 777 ${{ github.workspace }}/zap-reports

          docker run --network="host" \
            --name zap-container \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8000 \
            -r /zap/wrk/zap-report.html \
            -l Medium || true

          docker cp zap-container:/zap/wrk/zap-report.html \
            ${{ github.workspace }}/zap-reports/zap-report.html || true

          ls -la ${{ github.workspace }}/zap-reports/

          ZAP_EXIT=$(docker inspect zap-container \
            --format='{{.State.ExitCode}}')
          echo "ZAP exit code: $ZAP_EXIT"

          docker rm zap-container

          if [ "$ZAP_EXIT" -ge 2 ]; then
            exit $ZAP_EXIT
          fi
        continue-on-error: true

      - name: List report files (debug)
        if: always()
        run: |
          echo "=== Contenido de zap-reports ==="
          ls -la ${{ github.workspace }}/zap-reports/

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: ${{ github.workspace }}/zap-reports/zap-report.html
          if-no-files-found: warn

      - name: Fail if High or Medium vulnerabilities found
        if: steps.zap_scan.outcome == 'failure'
        run: |
          echo "❌ DAST scan encontró vulnerabilidades Medium o High!"
          echo "Descarga el reporte zap-security-report para ver los detalles."
          exit 1
