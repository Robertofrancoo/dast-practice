name: DAST Security Scan - OWASP ZAP

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite correrlo manualmente

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Bajar el código del repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instalar Docker (ya viene en ubuntu-latest)
      - name: Verify Docker
        run: docker --version

      # 3. Construir y levantar la app con Docker
      - name: Build and start app
        run: |
          docker build -t dast-practice-app .
          docker run -d -p 8000:8000 --name my-app dast-practice-app

      # 4. Esperar a que la app esté lista
      - name: Wait for app to be ready
        run: |
          echo "Esperando que la app inicie..."
          sleep 10
          curl http://localhost:8000/health

      # 5. Correr OWASP ZAP (el escáner DAST)
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline-scan@v0.12.0
        with:
          target: 'http://localhost:8000'
          fail_action: false   # no falla el pipeline, solo reporta
          artifact_name: 'zap-report'

      # 6. Guardar el reporte como artifact descargable
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
