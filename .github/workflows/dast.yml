name: DAST Security Scan - OWASP ZAP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - name: Start app with Docker Compose
        run: |
          docker compose up -d --build
          echo "Esperando que MySQL y PHP inicien..."
          sleep 30

      - name: Init database
        run: |
          docker compose exec -T db mysql -uroot -prootpassword testdb < init.sql

      - name: Verify app is running
        run: curl -f http://localhost:8000/

      - name: Pull OWASP ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run OWASP ZAP Scan
        id: zap_scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-reports
          chmod 777 ${{ github.workspace }}/zap-reports

          # Opciones de scan:
          # zap-full-scan.py   → scan completo (~5-10 min)
          # zap-baseline.py    → scan rápido (~1 min)
          ZAP_SCRIPT="zap-full-scan.py"

          docker run --network="host" \
            --name zap-container \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            $ZAP_SCRIPT \
            -t http://localhost:8000 \
            -r /zap/wrk/zap-report.html \
            -l WARN || true

          ls -la ${{ github.workspace }}/zap-reports/

          ZAP_EXIT=$(docker inspect zap-container \
            --format='{{.State.ExitCode}}')
          echo "ZAP exit code: $ZAP_EXIT"

          docker rm zap-container

          if [ "$ZAP_EXIT" -ge 2 ]; then
            exit $ZAP_EXIT
          fi
        continue-on-error: true

      - name: List report files (debug)
        if: always()
        run: |
          echo "=== Contenido de zap-reports ==="
          ls -la ${{ github.workspace }}/zap-reports/

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: ${{ github.workspace }}/zap-reports/zap-report.html
          if-no-files-found: warn

      - name: Fail if High or Medium vulnerabilities found
        if: steps.zap_scan.outcome == 'failure'
        run: |
          echo "❌ DAST scan encontró vulnerabilidades Medium o High!"
          echo "Descarga el reporte zap-security-report para ver los detalles."
          exit 1
